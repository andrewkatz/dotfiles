"Alt + Shift + Z" = { exec = ["/Users/andrewkatz/.config/rift/scripts/move-window-to-workspace-and-follow", "25"] }

# Workspace back-and-forth.
"Alt + Tab" = "switch_to_last_workspace"

# App/window actions.
"Alt + Enter" = { exec = ["/usr/bin/osascript", "-e", "tell application \"Brave Browser\" to make new window", "-e", "tell application \"Brave Browser\" to activate"] }
"Alt + Shift + F" = "toggle_fullscreen"
"Alt + Shift + Space" = "toggle_window_floating"

# Rift controls that avoid AeroSpace workspace-key conflicts.
"Alt + Ctrl + Z" = "toggle_space_activated"
"Alt + Ctrl + R" = { exec = ["/opt/homebrew/bin/rift-cli", "execute", "config", "reload"] }
"Alt + Ctrl + D" = "debug"
"Alt + Ctrl + S" = "serialize"
"Alt + Ctrl + Q" = "save_and_exit"
