AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

    awk '/^[[:space:]]*KAMAL_SSH_PROXY_USER[[:space:]]*=/{ print; exit }' "{{ primary_worktree_path }}/mise.local.toml" >> mise.local.toml 2>/dev/null || true

mise trust
""",
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
WEB_PORT = {{ branch | hash_port }}
COMPOSE_PROJECT_NAME = "via-platform"
DATABASE_PORT = 24662
REDIS_PORT = 52944
MAILHOG_SMTP_PORT = 53865
MAILHOG_HTTP_PORT = 26053
