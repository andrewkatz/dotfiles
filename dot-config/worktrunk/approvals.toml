AWS_REGION = "us-west-2"
AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

    awk '/^[[:space:]]*KAMAL_SSH_PROXY_USER[[:space:]]*=/{ print; exit }' "{{ primary_worktree_path }}/mise.local.toml" >> mise.local.toml 2>/dev/null || true

mise trust
""",
    "mise exec -- docker-compose up -d --no-recreate ; sleep 2",
]
