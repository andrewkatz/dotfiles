[projects."github.com/andrewkatz/cue"]
approved-commands = [
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
ADMIN_EMAIL = "andrew.katz@hey.com"
ADMIN_PASSWORD = "testtest"
EOF

mise trust
""",
    """
    cp {{ primary_worktree_path }}/config/master.key config/master.key 2>/dev/null || true
    cp {{ primary_worktree_path }}/config/credentials/*.key config/credentials/ 2>/dev/null || true
""",
    "mise exec -- bin/setup --skip-server",
]

[projects."github.com/getcomfortly/comfortly-prototype"]
approved-commands = [
    "mise trust",
    "mise install && mise exec -- npm install",
]

[projects."github.com/getcomfortly/developerly"]
approved-commands = [
    "mise trust",
]

[projects."github.com/getcomfortly/inn_management"]
approved-commands = [
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
DATABASE_PORT = {{ ("DATABASE_PORT" ~ branch) | hash_port }}
DATABASE_SUFFIX = "_{{ ("DATABASE" ~ branch) | hash_port }}"
MAILHOG_SMTP_PORT = {{ ("MAILHOG_SMTP_PORT" ~ branch) | hash_port }}
MAILHOG_HTTP_PORT = {{ ("MAILHOG_HTTP_PORT" ~ branch) | hash_port }}
EOF

mise trust
""",
    "cp {{ primary_worktree_path }}/config/credentials/*.key config/credentials/ 2>/dev/null || true",
    "mise exec -- docker-compose up -d ; sleep 2",
    "mise exec -- bin/setup",
    "mise exec -- docker-compose down",
]

[projects."github.com/giant-partners/platform"]
approved-commands = [
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
DATABASE_PORT = {{ ("DATABASE_PORT" ~ branch) | hash_port }}
REDIS_PORT = {{ ("REDIS_PORT" ~ branch) | hash_port }}
MAILHOG_SMTP_PORT = {{ ("MAILHOG_SMTP_PORT" ~ branch) | hash_port }}
MAILHOG_HTTP_PORT = {{ ("MAILHOG_HTTP_PORT" ~ branch) | hash_port }}
AWS_REGION = "us-west-2"
AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

mise trust
""",
    "cp {{ primary_worktree_path }}/config/credentials/*.key config/credentials/ 2>/dev/null || true",
    "mise exec -- docker-compose up -d ; sleep 2",
    "mise exec -- bin/setup",
    "mise exec -- docker-compose down",
    "mise exec -- bin/cleanup",
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
WEB_PORT = {{ branch | hash_port }}
DATABASE_PORT = {{ ("DATABASE_PORT" ~ branch) | hash_port }}
REDIS_PORT = {{ ("REDIS_PORT" ~ branch) | hash_port }}
MAILHOG_SMTP_PORT = {{ ("MAILHOG_SMTP_PORT" ~ branch) | hash_port }}
MAILHOG_HTTP_PORT = {{ ("MAILHOG_HTTP_PORT" ~ branch) | hash_port }}
AWS_REGION = "us-west-2"
AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

mise trust
""",
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
WEB_PORT = {{ branch | hash_port }}
DATABASE_PORT = {{ ("DATABASE_PORT" ~ branch) | hash_port }}
REDIS_PORT = {{ ("REDIS_PORT" ~ branch) | hash_port }}
MAILHOG_SMTP_PORT = {{ ("MAILHOG_SMTP_PORT" ~ branch) | hash_port }}
MAILHOG_HTTP_PORT = {{ ("MAILHOG_HTTP_PORT" ~ branch) | hash_port }}
AWS_REGION = "us-west-2"
AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

    awk '/^[[:space:]]*KAMAL_SSH_PROXY_USER[[:space:]]*=/{ print; exit }' "{{ primary_worktree_path }}/mise.local.toml" >> mise.local.toml 2>/dev/null || true

mise trust
""",
    """
    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
WEB_PORT = {{ branch | hash_port }}
COMPOSE_PROJECT_NAME = "via-platform"
DATABASE_PORT = 24662
REDIS_PORT = 52944
MAILHOG_SMTP_PORT = 53865
MAILHOG_HTTP_PORT = 26053
PLATFORM_DATABASE_NAME = "app_dev_{{ branch | sanitize_db }}"
CORE_DATABASE_NAME = "core_dev_{{ branch | sanitize_db }}"
PLATFORM_TEST_DATABASE_NAME = "app_test_{{ branch | sanitize_db }}"
CORE_TEST_DATABASE_NAME = "core_test_{{ branch | sanitize_db }}"
REDIS_NAMESPACE = "via:{{ branch | sanitize_db }}"
AWS_REGION = "us-west-2"
AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

    awk '/^[[:space:]]*KAMAL_SSH_PROXY_USER[[:space:]]*=/{ print; exit }' "{{ primary_worktree_path }}/mise.local.toml" >> mise.local.toml 2>/dev/null || true

mise trust
""",
    "mise exec -- docker-compose up -d --no-recreate ; sleep 2",
    """
    primary_mise="{{ primary_worktree_path }}/mise.local.toml"

    primary_env_value() {
      if [ -f "$primary_mise" ]; then
        awk -F= -v key="$1" '
          $1 ~ "^[[:space:]]*" key "[[:space:]]*$" {
            value = $0
            sub("^[^=]*=", "", value)
            sub("^[[:space:]]*", "", value)
            sub("[[:space:]]*$", "", value)
            print value
            exit
          }
        ' "$primary_mise"
      fi
    }

    compose_project_name=$(primary_env_value COMPOSE_PROJECT_NAME)
    database_port=$(primary_env_value DATABASE_PORT)
    redis_port=$(primary_env_value REDIS_PORT)
    mailhog_smtp_port=$(primary_env_value MAILHOG_SMTP_PORT)
    mailhog_http_port=$(primary_env_value MAILHOG_HTTP_PORT)

    compose_project_name=${compose_project_name:-'"via-platform"'}
    database_port=${database_port:-24662}
    redis_port=${redis_port:-52944}
    mailhog_smtp_port=${mailhog_smtp_port:-53865}
    mailhog_http_port=${mailhog_http_port:-26053}

    cat > mise.local.toml <<EOF
# Auto-generated for worktree: $next_num
[env]
PORT = {{ branch | hash_port }}
WEB_PORT = {{ branch | hash_port }}
COMPOSE_PROJECT_NAME = $compose_project_name
DATABASE_PORT = $database_port
REDIS_PORT = $redis_port
MAILHOG_SMTP_PORT = $mailhog_smtp_port
MAILHOG_HTTP_PORT = $mailhog_http_port
PLATFORM_DATABASE_NAME = "app_dev_{{ branch | sanitize_db }}"
CORE_DATABASE_NAME = "core_dev_{{ branch | sanitize_db }}"
PLATFORM_TEST_DATABASE_NAME = "app_test_{{ branch | sanitize_db }}"
CORE_TEST_DATABASE_NAME = "core_test_{{ branch | sanitize_db }}"
REDIS_NAMESPACE = "via:{{ branch | sanitize_db }}"
AWS_REGION = "us-west-2"
AWS_DEFAULT_PROFILE = "p"
SNOWFLAKE_DEV_SUFFIX = "ANDREW_{{ branch | sanitize_db }}"
EOF

    awk '/^[[:space:]]*KAMAL_SSH_PROXY_USER[[:space:]]*=/{ print; exit }' "$primary_mise" >> mise.local.toml 2>/dev/null || true

mise trust
""",
]
