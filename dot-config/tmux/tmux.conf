# reattach-to-user-namespace is required for copying to work in tmux on macOS.
# Only enable it when installed so tmux can start on hosts without it.
if-shell 'command -v reattach-to-user-namespace >/dev/null 2>&1' 'set-option -g default-command "reattach-to-user-namespace -l zsh"'

# reload tmux config
unbind r
bind r source-file ~/.config/tmux/tmux.conf

# window splits | for vertical - for horizontal
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# add clear screen binding, since tmux-navigator uses Ctrl-l
bind C-l send-keys 'C-l'

# open `d tui` in a popup in the current pane's working directory
bind-key -n C-o display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "$HOME/.local/bin/developerly tui"

# developerly quickstart: spawn a local agent worktree from a prompt
bind-key -n C-t display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "$HOME/.local/bin/developerly tui --quickstart"

# True color settings
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",xterm-256color:Tc"

# pass modified keys (Shift/Ctrl + Enter, etc.) through to applications
set -g extended-keys on
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

# set leader to Ctrl-a
set -g prefix C-a

# use vim keys for pane naviation
setw -g mode-keys vi
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# switch to last window with Ctrl-a Ctrl-a
bind-key C-a last-window

# rename current window (prompt starts blank)
bind-key R command-prompt "rename-window '%%'"
bind-key -n M-r command-prompt "rename-window '%%'"

# switch to window by number (Meta + number, no prefix needed)
bind-key -n M-0 select-window -t 0
bind-key -n M-1 select-window -t 1
bind-key -n M-2 select-window -t 2
bind-key -n M-3 select-window -t 3
bind-key -n M-4 select-window -t 4
bind-key -n M-5 select-window -t 5
bind-key -n M-6 select-window -t 6
bind-key -n M-7 select-window -t 7
bind-key -n M-8 select-window -t 8
bind-key -n M-9 select-window -t 9

# start window and pane numbering at 1
set -g base-index 1
set -g pane-base-index 1

# renumber windows when one is closed
set-option -g renumber-windows on

# wrap at word boundaries
set -g wrap-search off

# increase scrollback buffer size
set-option -g history-limit 50000

# allow mouse scrolling
set -g mouse on


# plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'niksingh710/minimal-tmux-status'
set -g @plugin 'tmux-plugins/tmux-sensible'

# tmux status bar
set -g @minimal-tmux-status "top"
# Rectangular pills use the Carbonfox palette. Codex+Claude come from
# codex-usage-bars; agent (#484848) and session (#82a8f8) continue that chain.
set -g @minimal-tmux-status-right "#($HOME/.local/bin/codex-usage-bars)#[bg=#484848,fg=#f2f4f8] #($HOME/.local/bin/developerly status --plain) #[bg=#82a8f8,fg=#161616] #S #[default]"
# Old configurations may have set this; explicitly clear so we don't get a
# stale duplicate session name trailing the chain.
set -g @minimal-tmux-status-right-extra ""
set -g @minimal-tmux-justify "left"
set -g @minimal-tmux-left false
set -g status-left-length 50
set -g status-right-length 400
set -g status-interval 2

# Make sure tmux from homebrew is used
set-environment -g PATH "/opt/homebrew/bin:/bin:/usr/bin"

# run TPM
run '~/.config/tmux/plugins/tpm/tpm'
